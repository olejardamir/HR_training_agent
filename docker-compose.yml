services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PROJECT_ROOT: /project
      LLM_PROVIDER: ${LLM_PROVIDER:-fallback}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-true}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-3}
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    volumes:
      - .:/project
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:1.121.0
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
      N8N_AUTH_ENABLED: "false"
      N8N_DISABLE_TELEMETRY: "true"
      API_BASE_URL: http://api:8000
    volumes:
      - ./n8n:/n8n-workflows
      - n8n_data:/home/node/.n8n
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
